<section class="cart">

<h2>Shopping Cart</h2>

<div id="cart-items"></div>

<div class="bill-box">

<p>Products Price: Rs.<span id="product-price">0</span></p>

<p>Shipping Fee: Rs.200</p>

<h3>Total: Rs.<span id="final-total">0</span></h3>

</div>

<div class="address-box">

<button id="open-address">Add Address</button>

</div>

<div class="cart-buttons">

<button id="checkout-btn">
Checkout
</button>

<button id="order-btn">
Place Order
</button>

</div>

</section>

<div class="address-popup" id="address-popup">

<div class="popup-content">

<span id="close-popup">&times;</span>

<h2>Add Address</h2>

<input type="text" id="fullname" placeholder="Full Name">

<input type="text" id="phone" placeholder="Phone">

<input type="text" id="city" placeholder="City">

<textarea id="address" placeholder="Address"></textarea>

<button id="save-address">Save Address</button>

</div>

</div>
